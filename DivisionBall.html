function onImpact() {                                     // Z.2172
  gameState = S.ANIMATING;
  currentDornIndex = 0;
  animationStartTime = now();
  activePieces = [];
  if (dornPositions.length) {
    const x = dornPositions[0][0], y = dornPositions[0][1];
    activePieces.push({ x: x, y: y - 60, vx: 0, vy: 0, size: 20, lastDornHit: -1 });
  }
}

function updateAnimation() {                              // Z.2188
  if (gameState !== S.ANIMATING) return;
  const baseDeltaTime = 16/1000;
  const deltaTime = wasSkipped ? baseDeltaTime*5 : baseDeltaTime;
  const gravity = 800;

  for (const p of activePieces) {
    p.vy += gravity*deltaTime;
    p.x += p.vx*deltaTime;
    p.y += p.vy*deltaTime;
  }

  for (let dornIndex = 0; dornIndex < dornPositions.length; dornIndex++) {
    if (dornIndex >= dornDividers.length) continue;
    const dornX = dornPositions[dornIndex][0], dornY = dornPositions[dornIndex][1];
    const divider = dornDividers[dornIndex];
    const toSplit = [];
    for (const p of activePieces) {
      if (p.lastDornHit >= dornIndex) continue;
      const dx = p.x - dornX, dy = p.y - dornY;
      if (Math.sqrt(dx*dx + dy*dy) < 50) toSplit.push(p);
    }
    if (toSplit.length) {
      activePieces = activePieces.filter(p => toSplit.indexOf(p) === -1);
      for (const p of toSplit)
        for (let i = 0; i < divider; i++) {
          const angle = (360/divider)*i;
          const rad = angle*Math.PI/180;
          activePieces.push({ x: dornX, y: dornY,
            vx: 100*Math.cos(rad), vy: 100*Math.sin(rad) + 50,
            size: p.size*0.7, lastDornHit: dornIndex });
        }
    }
  }

  const inBowl = [];
  for (const p of activePieces)
    if (p.y >= bowlY - 30) {
      p.x = bowlX + (Math.random()*60 - 30);
      p.y = bowlY - 10 + (Math.random()*20 - 10);
      p.vx = 0; p.vy = 0;
      inBowl.push(p);
    }
  activePieces = activePieces.filter(p => inBowl.indexOf(p) === -1);
  for (const p of inBowl) if (bowlPieces.length < 50) bowlPieces.push(p);

  if (activePieces.length === 0 && inBowl.length > 0) {
    gameState = S.EVALUATING;
    ballX = bowlX; ballY = bowlY - 70;
    wasSkipped = false;
    later(evaluateResult, 800);
  }
}

// ===============================================================
//  WERTUNG  (Z. 2286-2433)
// ===============================================================

function calculateTieredBonus(seconds) {                  // Z.2387
  if (seconds <= 0) return 0n;
  let remaining = B(seconds), bonus = 0n;
  let tier = ((B(seconds) - 1n)/10n) + 1n;
  while (remaining > 0n) {
    const inThisTier = bMin(remaining, 10n);
    bonus += inThisTier*tier;
    remaining -= inThisTier;
    tier = bMax(1n, tier - 1n);
  }
  return bonus;
}

function findNiceBonus(currentScore, rawBonus, nextDornCount) {   // Z.2401
  const baseScore = currentScore + rawBonus;
  const startOffset = B(Math.floor(Math.random()*301));

  for (let i = 0n; i <= 300n; i++) {                      // Durchlauf 1
    const extra = (startOffset + i) % 301n;
    const candidate = baseScore + extra;
    let good;
    if (nextDornCount === 1) good = findCleanDivisors(candidate, 9).length > 0;
    else {
      const combo = findValidDividerCombination(candidate, nextDornCount);
      good = combo.every(d => d !== 1);
    }
    if (good) return rawBonus + extra;
  }
  for (let i = 0n; i <= 300n; i++) {                      // Durchlauf 2
    const extra = (startOffset + i) % 301n;
    const candidate = baseScore + extra;
    let good;
    if (nextDornCount === 1) good = findCleanDivisors(candidate, 9).length > 0;
    else {
      const combo = findValidDividerCombination(candidate, nextDornCount);
      const ones = combo.filter(d => d === 1).length;
      good = ones <= Math.max(1, Math.floor(nextDornCount/4));
    }
    if (good) return rawBonus + extra;
  }
  return rawBonus + startOffset;
}

function evaluateResult() {                               // Z.2286
  const totalDivisor = prodB(dornDividers);
  const originalScore = score;
  const expected = originalScore / totalDivisor;
  const count = totalDivisor;

  let correctTotal = 0n, wrongTotal = 0n;
  for (const c of collectedNumbers) {
    if (c.value === expected) correctTotal += B(c.multiplier);
    else wrongTotal += B(c.multiplier);
  }

  if (wrongTotal > 0n) {                                  // Z.2305
    failScoreBefore = score; failCorrectAnswer = expected;
    failCollected = collectedNumbers.map(c => c.value);
    addHighscoreEntry();
    score = 0n; wasSuccess = false;
  } else if (correctTotal === count) {                    // Z.2314
    score *= 2n; wasSuccess = true;
    if (difficulty === 4) {
      const elapsed = now() - ballFlightStartTime;
      const remainingSeconds = Math.floor(Math.max(0, flightDuration - elapsed)/1000);
      const rawBonus = calculateTieredBonus(remainingSeconds);
      const nextRound = round + 1;
      const nextDornCount = nextRound<=3?1:nextRound<=6?2:nextRound<=10?3:nextRound<=15?4:
        nextRound<=20?5:nextRound<=25?6:nextRound<=30?7:nextRound<=35?8:nextRound<=40?9:10;
      const adjustedBonus = findNiceBonus(score, rawBonus, nextDornCount);
      const finalScore = score + adjustedBonus;
      const scoreBeforeBonus = score;
      bonusTotal = finalScore - score;
      bonusSecondsLeft = remainingSeconds;
      bonusPointsAdded = 0n;
      score = finalScore;
      displayScore = scoreBeforeBonus;
      gameState = S.BONUS;
      startBonusAnimation();
    }
  } else if (correctTotal < count) {                      // Z.2351
    failScoreBefore = score; failCorrectAnswer = expected;
    failCollected = collectedNumbers.map(c => c.value);
    const newScore = correctTotal*expected*2n;
    if (newScore <= 0n) addHighscoreEntry();
    score = newScore < 0n ? 0n : newScore;
    wasSuccess = false;
  } else {                                                // Z.2362
    failScoreBefore = score; failCorrectAnswer = expected;
    failCollected = collectedNumbers.map(c => c.value);
    const excess = correctTotal - count;
    score = count*expected*2n;
    score -= excess*expected*3n;
    if (score <= 0n) addHighscoreEntry();
    if (score < 0n) score = 0n;
    wasSuccess = false;
  }

  if (gameState !== S.BONUS) gameState = S.RESULT;
  saveGameState();
}

function startBonusAnimation() {                          // Z.2435
  gameState = S.BONUS;
  const totalSecondsForAnim = bonusSecondsLeft;
  if (bonusTimer) clearTimeout(bonusTimer);
  const step = () => {
    if (gameState !== S.BONUS) return;
    if (bonusSecondsLeft > 0) {
      const s = bonusSecondsLeft > 200 ? 10 : bonusSecondsLeft > 100 ? 5
              : bonusSecondsLeft > 30 ? 2 : 1;
      const actual = Math.min(s, bonusSecondsLeft);
      bonusSecondsLeft -= actual;
      const elapsed = totalSecondsForAnim - bonusSecondsLeft;
      bonusPointsAdded = totalSecondsForAnim > 0
        ? (bonusTotal * B(elapsed)) / B(totalSecondsForAnim) : bonusTotal;
      displayScore = (score - bonusTotal) + bonusPointsAdded;
      bonusTimer = setTimeout(step, 30);
    } else {
      bonusPointsAdded = bonusTotal;
      displayScore = score;
      gameState = S.RESULT;
    }
  };
  bonusTimer = setTimeout(step, 30);
}

function resetGame() {                                    // Z.2507
  if (score < 10n) { score = 100n; round = 1; }
  else if (wasSuccess) round++;
  if (round === 1) bowlPieces = [];
  displayScore = score; displayRound = round;
  gameState = S.IDLE;
  isResetting = false;
  ballX = springX; ballY = getBallOnSpringY();
  springCompression = 0;
  collectedNumbers = [];
  numberPool = [];
  removeFlashes = [];
  currentMultiplier = 1;
  proCountdownActive = false;
  updateActiveDornCount();
  const prevRows = multiplierRowCount;
  updateExpansion();                       // aktualisiert Reihen + loest ggf. Animation aus
  if (multiplierRowCount !== prevRows) {
    // Layout hat sich geaendert -> Bank/Bahn/Collection neu vermessen.
    // isInitialized zuruecksetzen, damit initializePositions durchlaeuft.
    isInitialized = false;
    initializePositions();                 // ruft updateExpansion erneut, aber ohne erneuten Trigger
  } else {
    createMultiplierButtons();
    positionDorns();
  }
  updateAvailableDividers();
  saveGameState();
}

// ===============================================================
//  SPEICHERN  (Z. 1430-1490)
// ===============================================================

// Alte Versionen dieser Datei haben unter denselben Schluesseln gespeichert -
// mit fehlerhaften Werten aus der Fliesskomma-Rechnung. Ein Versionsschluessel
// sorgt dafuer, dass solche Staende nicht weiterwirken.
const SAVE_VERSION = '2';

function loadGameState() {
  try {
    if (localStorage.getItem('db_version') !== SAVE_VERSION) {
      localStorage.removeItem('db_score');
      localStorage.removeItem('db_round');
      localStorage.removeItem('db_difficulty');
      localStorage.removeItem('db_sliderValue');
      localStorage.removeItem('db_highscores');
      localStorage.setItem('db_version', SAVE_VERSION);
    }
    score = B(localStorage.getItem('db_score') || '100');
    round = parseInt(localStorage.getItem('db_round') || '1', 10);
    difficulty = parseInt(localStorage.getItem('db_difficulty') || '0', 10);
    sliderValue = parseFloat(localStorage.getItem('db_sliderValue') || '120');
  } catch (e) { score = 100n; round = 1; difficulty = 0; sliderValue = 120; }
  // Wurde mit verlorenem Spiel gespeichert (Score auf 0 gesetzt, Runde noch hoch)?
  // Dann wie bei resetGame() sauber zuruecksetzen - sonst koennte man im hohen Level
  // mit 0 Punkten neu starten und sich ueber Zeitboni wieder hocharbeiten.
  if (score < 10n) { score = 100n; round = 1; }
  pendingDifficulty = difficulty;
  pendingScoreAdjustment = score;
  flightDuration = Math.floor(sliderValue*1000);
  displayScore = score; displayRound = round;
  updateActiveDornCount(); updateExpansion(); updateAvailableDividers(); positionDorns();
  // Vollstaendige Layout-Neuberechnung mit der GELADENEN Runde erzwingen.
  // Beim Start liefen resize()/initializePositions() noch mit round=1 (Spielstand noch
  // nicht geladen) -> nur 3 Reihen, kleine Collection. Jetzt neu vermessen, damit
  // Reihen (ab R15/R27) und Collection-Groesse (ab R21) zur echten Runde passen.
  isInitialized = false;
  initializePositions();
}

function saveGameState() {
  if (demoSaved) return;   // Demo laeuft: nie den Demo-Zustand speichern
  try {
    localStorage.setItem('db_score', score.toString());
    localStorage.setItem('db_round', String(round));
    localStorage.setItem('db_difficulty', String(difficulty));
    localStorage.setItem('db_sliderValue', String(sliderValue));
  } catch (e) {}
}

function loadHighscores() {
  try {
    const raw = localStorage.getItem('db_highscores');
    if (!raw) return;
    highscores = JSON.parse(raw).map(o => ({
      score: B(o.score), round: o.round, difficulty: o.difficulty || 0, date: o.date
    }));
  } catch (e) { highscores = []; }
}

function saveHighscores() {
  try {
    localStorage.setItem('db_highscores', JSON.stringify(highscores.map(e => ({
      score: e.score.toString(), round: e.round, difficulty: e.difficulty, date: e.date
    }))));
  } catch (e) {}
}

function addHighscoreEntry() {                            // Z.1483
  const d = new Date();
  const pad = n => String(n).length < 2 ? '0' + n : String(n);
  const date = pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear();
  highscores.push({ score: score, round: round, difficulty: difficulty, date: date });
  highscores.sort((a,b) => (b.score > a.score) ? 1 : (b.score < a.score) ? -1 : 0);
  if (highscores.length > 39) highscores.pop();
  saveHighscores();
}

// ===============================================================
//  EINGABE  (Z. 1695-1982)
// ===============================================================

function pos(e) {
  // Simulierte Klicks aus dem Anleitungsfilm bringen die Spielkoordinaten
  // schon mit - keine Umrechnung noetig.
  if (e.__demo) return { x: e.__demo.x, y: e.__demo.y };
  // Der Canvas wird skaliert dargestellt. Der Klick kommt in Bildschirm-
  // Pixeln an und muss zurueck in die Original-Koordinaten.
  // Wir nutzen UNSERE eigenen, in resize() gesetzten Werte (canvasRect) statt
  // getBoundingClientRect(), das Firefox zeitweise falsch meldet. Fallback auf
  // das Browser-Rect, falls canvasRect (noch) nicht gesetzt ist (z.B. Desktop).
  const r = canvasRect || cv.getBoundingClientRect();
  const t = e.changedTouches ? e.changedTouches[0] : e;
  return {
    x: (t.clientX - r.left) * (BASE_W / r.width),
    y: (t.clientY - r.top)  * (BASE_H / r.height)
  };
}

function hitCollected(px, py) {                           // Z.1818
  const G = collectionGeom();
  let xOffset = G.firstX, row = 0;
  for (let i = 0; i < collectedNumbers.length; i++) {
    if (row >= G.maxRows) break;
    if (i > 0 && i % G.ballsPerRow === 0) {
      row++; xOffset = G.firstX;
      if (row >= G.maxRows) break;
    }
    const yOffset = G.slotTop + 50 + row*G.rowH;
    const dx = px - xOffset, dy = py - yOffset;
    if (Math.sqrt(dx*dx + dy*dy) < 24) {
      const removed = collectedNumbers.splice(i,1)[0];
      const flashUntil = now() + 700;   // kurzes Aufflammen
      // 1) obere, angeklickte Kugel an ihrer Position rot aufflammen lassen
      removeFlashes.push({ x: xOffset, y: yOffset, r: 24, until: flashUntil });
      // 2) zugehoerige untere Auswahlkugel ebenfalls rot aufflammen (immer)
      const poolBtn = numberPool.filter(n => n.value === removed.value)[0];
      if (poolBtn) removeFlashes.push({ x: poolBtn.x, y: poolBtn.y, r: poolBtn.radius, until: flashUntil });
      // Auswahlkugel nur abwaehlen, wenn keine weitere gleiche mehr gesammelt ist
      const still = collectedNumbers.filter(c => c.value === removed.value).length;
      if (still === 0 && poolBtn) poolBtn.clicked = false;
      return true;
    }
    xOffset += G.stepX;
  }
  return false;
}

// Multiplikator-Treffer prüfen - berücksichtigt Scroll-Offset UND das sichtbare Fenster.
// Von beiden Spielzuständen (FLYING, ANIMATING) genutzt, damit sie synchron bleiben.
function hitMultiplier(px, py) {
  const win = multiplierWindow();
  if (py < win.top || py > win.top + win.height) return false;   // nur im Fenster
  for (const btn of multiplierButtons) {
    const drawY = btn.y - multiplierScrollY;
    if (px >= btn.x && px <= btn.x + btn.width &&
        py >= drawY - btn.height/2 && py <= drawY + btn.height/2) {
      currentMultiplier = (currentMultiplier === btn.value) ? 1 : btn.value;
      return true;
    }
  }
  return false;
}

// Prüft, ob ein Druck im scrollbaren Multiplikator-Fenster begann (für Scroll-Drag).
function inMultiplierWindow(px, py) {
  const win = multiplierWindow();
  return multiplierMaxScroll > 0 &&
         px >= bankLeft && px <= bankRight &&
         py >= win.top && py <= win.top + win.height;
}

// Liefert Fingerabstand und Mittelpunkt (in BASE-Koordinaten) bei 2+ Fingern.
function pinchInfo(e) {
  if (!e.touches || e.touches.length < 2) return null;
  const a = e.touches[0], b = e.touches[1];
  const r = canvasRect || cv.getBoundingClientRect();
  const ax = (a.clientX - r.left) * (BASE_W / r.width);
  const ay = (a.clientY - r.top)  * (BASE_H / r.height);
  const bx = (b.clientX - r.left) * (BASE_W / r.width);
  const by = (b.clientY - r.top)  * (BASE_H / r.height);
  const dx = bx - ax, dy = by - ay;
  return { dist: Math.sqrt(dx*dx + dy*dy), cx: (ax+bx)/2, cy: (ay+by)/2 };
}

function onDown(e) {
  e.preventDefault();

  // Zweiter Finger da? -> Lupe sofort starten, kein Spielzug.
  if (e.touches && e.touches.length >= 2) {
    const pi = pinchInfo(e);
    if (pi) {
      // Laufende Aktionen abbrechen, damit die Lupe keinen Schuss/Zug ausloest.
      if (gameState === S.CHARGING) { gameState = S.IDLE; springCompression = 0; }
      isDraggingSlider = false; isDraggingDiffSlider = false;
      mulScrollDragging = false; mulScrollMoved = false;
      skipPending = false;   // an der Feder begonnener Skip verfaellt bei Lupe
      // Hat der noch gedrueckte erste Finger GERADE eine Kugel eingesammelt (Tipp noch
      // nicht losgelassen)? Dann war das nur der Weg zur Lupe -> Kugel zurueckgeben.
      // Bereits abgeschlossene Kugeln (Finger war zwischendurch weg) bleiben unberuehrt.
      if (lastCollectedByTap) {
        const btn = lastCollectedByTap;
        btn.clicked = false;
        // Die gerade gesammelte Kugel ist der ZULETZT hinzugefuegte Eintrag -> den entfernen.
        // (Nicht nach value suchen: zwei Kugeln koennten denselben Wert haben.)
        if (collectedNumbers.length) collectedNumbers.pop();
        lastCollectedByTap = null;
      }
      zoomActive = true;
      zoomStartDist = pi.dist || 1;
      zoomCX = pi.cx; zoomCY = pi.cy;
      zoomFactor = 1;
      touchLockUntilRelease = true;   // nach der Lupe erst alle Finger weg
    }
    return;
  }

  // Nach einer Lupe: solange noch ein Finger auf dem Schirm ist, keinen Spielzug
  // zulassen. Erst wenn ALLE Finger weg waren (onUp bei 0 Fingern), wieder frei.
  if (touchLockUntilRelease) return;

  const p = pos(e), tNow = now();

  // Intro: Standbild muss sichtbar sein (t >= 0.75) damit Start-Tipp gilt.
  // Das Vollbild wird NICHT hier (touchstart) angefordert - viele mobile Browser
  // lehnen das ab. Wir merken uns nur den gueltigen Start-Tipp; das Vollbild wird
  // beim Loslassen (touchend/onUp) ausgeloest, wo die Geste akzeptiert wird.
  if (gameState === S.INTRO) {
    const elapsed = performance.now() - introStartTime;
    if (elapsed >= INTRO_DURATION * 0.75) introStartPending = true;
    return;
  }

  // Film laeuft: jeder ECHTE Klick beendet ihn. Simulierte nicht.
  if (!demoActive && demoSaved) { stopDemo(); return; }
  if (demoActive && !e.__demo) { stopDemo(); return; }

  // Anleitungs-Knopf (Fragezeichen) - IMMER klickbar, egal in welcher Phase.
  // Laeuft gerade eine Runde, friert startDemo() sie vollstaendig ein; nach
  // der Anleitung setzt stopDemo() sie exakt an derselben Stelle fort.
  if (!demoActive) {
    const bx = W - 90, by = 70, r = 50;
    if (Math.sqrt((p.x-bx)*(p.x-bx) + (p.y-by)*(p.y-by)) < r) {
      startDemo();
      return;
    }
  }

  if (gameState === S.IDLE) {
    if (p.x >= W - 300 && p.y >= H - 100) {               // Z.1700
      loadHighscores(); highscoreScrollY = 0; gameState = S.HIGHSCORE; return;
    }
    for (let i = 0; i < dornPositions.length; i++) {      // Z.1707
      const dx = p.x - dornPositions[i][0], dy = p.y - dornPositions[i][1];
      if (Math.sqrt(dx*dx + dy*dy) < 55) {
        tappedDornIndex = i; tappedDornShowUntil = tNow + 2000; return;
      }
    }
    if (p.x >= sliderX && p.x <= sliderX + sliderWidth && Math.abs(p.y - sliderY) < 30) {
      isDraggingSlider = true; updateSliderValue(p.x); return;
    }
    if (p.x >= diffSliderX && p.x <= diffSliderX + diffSliderWidth && Math.abs(p.y - diffSliderY) < 30) {
      isDraggingDiffSlider = true; updateDifficultySliderValue(p.x); return;
    }
    const dx = p.x - springX, dy = p.y - springY;         // Z.1733
    if (Math.sqrt(dx*dx + dy*dy) < 50) { startCharging(); return; }
    return;
  }

  if (gameState === S.FLYING) {                           // Z.1771
    for (let i = 0; i < dornPositions.length; i++) {
      const dx = p.x - dornPositions[i][0], dy = p.y - dornPositions[i][1];
      if (Math.sqrt(dx*dx + dy*dy) < 55) {
        tappedDornIndex = i; tappedDornShowUntil = tNow + 2000; return;
      }
    }
    const dx = p.x - springX, dy = p.y - springY;         // Z.1786
    if (Math.sqrt(dx*dx + dy*dy) < 50) {
      // Skip NICHT sofort ausloesen - erst beim Loslassen (onUp), und nur wenn kein
      // zweiter Finger die Lupe gestartet hat. So katapultiert ein Zoom-Versuch an der
      // Feder den Ball nicht mehr versehentlich ins Ziel.
      skipPending = true; return;
    }
    // Scroll-Drag im Multiplikator-Fenster vormerken (wird erst bei Bewegung Scroll)
    if (inMultiplierWindow(p.x, p.y)) {
      mulScrollDragging = true; mulScrollStartY = p.y;
      mulScrollStartOffset = multiplierScrollY; mulScrollMoved = false;
    }
    if (hitMultiplier(p.x, p.y)) return;
    for (const btn of numberPool) {
      const bx = p.x - btn.x, by = p.y - btn.y;
      if (Math.sqrt(bx*bx + by*by) < btn.radius) { collectNumber(btn); lastCollectedByTap = btn; return; }
    }
    hitCollected(p.x, p.y);
    return;
  }

  if (gameState === S.ANIMATING) {                        // Z.1853
    if (inMultiplierWindow(p.x, p.y)) {
      mulScrollDragging = true; mulScrollStartY = p.y;
      mulScrollStartOffset = multiplierScrollY; mulScrollMoved = false;
    }
    if (hitMultiplier(p.x, p.y)) return;
    for (const btn of numberPool) {
      const bx = p.x - btn.x, by = p.y - btn.y;
      if (Math.sqrt(bx*bx + by*by) < btn.radius) { collectNumber(btn); lastCollectedByTap = btn; return; }
    }
    hitCollected(p.x, p.y);
    return;
  }

  if (gameState === S.RESULT) {                           // Z.1909
    if (!isResetting) { isResetting = true; gameState = S.IDLE; resetGame(); }
    return;
  }

  if (gameState === S.HIGHSCORE) {                        // Z.1918
    const cx = W/2, btnW = 130;
    const bx = [cx-200, cx-65, cx+70];
    for (let i = 0; i < 3; i++)
      if (p.x >= bx[i] && p.x <= bx[i]+btnW && p.y >= 100 && p.y <= 145) {
        highscoreSort = i; highscoreScrollY = 0; return;
      }
    if (p.y >= H - 100 && p.y <= H - 50) { gameState = S.IDLE; return; }
    // Im Listenbereich: Scroll-Ziehen vormerken
    if (p.y > 135 && p.y < H - 120) {
      hsScrollDragging = true; hsScrollStartY = p.y;
      hsScrollStartOffset = highscoreScrollY; hsScrollMoved = false;
    }
    return;
  }

  if (gameState === S.CONFIRM_DIFFICULTY) {               // Z.1940
    const cx = W/2, cy = H/2;
    if (p.y >= cy + 60 && p.y <= cy + 130) {
      if (p.x >= cx - 220 && p.x <= cx - 20) {
        score = pendingScoreAdjustment;
        difficulty = pendingDifficulty;
        updateActiveDornCount(); updateAvailableDividers(); positionDorns();
        gameState = S.IDLE; saveGameState();
      } else if (p.x >= cx + 20 && p.x <= cx + 220) {
        gameState = S.IDLE;
      }
    }
    return;
  }

  if (gameState === S.BONUS) {                            // Z.1966
    if (bonusTimer) clearTimeout(bonusTimer);
    bonusPointsAdded = bonusTotal;
    bonusSecondsLeft = 0;
    displayScore = score;
    gameState = S.RESULT;
    return;
  }
}

function onMove(e) {
  e.preventDefault();

  // Lupe aktiv: Fingerabstand bestimmt stufenlos die Vergroesserung.
  if (zoomActive) {
    const pi = pinchInfo(e);
    if (pi) {
      zoomCX = pi.cx; zoomCY = pi.cy;
      let f = pi.dist / zoomStartDist;        // >1 = aufziehen
      if (f < 1) f = 1;                       // nicht kleiner als normal
      if (f > 3.5) f = 3.5;                   // ordentlich groesser, aber begrenzt
      zoomFactor = f;
    }
    return;
  }

  const p = pos(e);

  // Bestenliste scrollen
  if (hsScrollDragging && gameState === S.HIGHSCORE) {
    const dy = p.y - hsScrollStartY;
    if (Math.abs(dy) > 10) hsScrollMoved = true;
    highscoreScrollY = hsScrollStartOffset - dy;
    return;
  }
  // Multiplikator-Bereich scrollen (Schwelle ~10px unterscheidet Scroll vom Tap)
  if (mulScrollDragging) {
    const delta = mulScrollStartY - p.y;
    if (Math.abs(delta) > 10) mulScrollMoved = true;
    if (mulScrollMoved) {
      multiplierScrollY = mulScrollStartOffset + delta;
      if (multiplierScrollY < 0) multiplierScrollY = 0;
      if (multiplierScrollY > multiplierMaxScroll) multiplierScrollY = multiplierMaxScroll;
    }
    return;
  }
  if (gameState === S.IDLE) {                             // Z.1741
    if (isDraggingSlider) { updateSliderValue(p.x); return; }
    if (isDraggingDiffSlider) { updateDifficultySliderValue(p.x); return; }
  }
}

function onUp(e) {
  e.preventDefault();

  // Lupe: sobald weniger als 2 Finger anliegen, Zoom sofort beenden (zurueckspringen).
  if (zoomActive && (!e.touches || e.touches.length < 2)) {
    zoomActive = false;
    zoomFactor = 1;
  }
  // Sind ALLE Finger weg? Dann Sperre aufheben - ab jetzt wieder normale Spielzuege.
  if (!e.touches || e.touches.length === 0) {
    touchLockUntilRelease = false;
  }
  // Ein Finger wurde gehoben -> laufender Tipp ist abgeschlossen. Ab jetzt gilt eine
  // dabei gesammelte Kugel als fest eingesammelt (kann nicht mehr per Zoom zurueck).
  lastCollectedByTap = null;
  // Solange die Sperre noch aktiv ist (nach Lupe, noch Finger drauf): kein Spielzug.
  if (touchLockUntilRelease) { if (mulScrollDragging) { mulScrollDragging = false; mulScrollMoved = false; } return; }

  if (mulScrollDragging) { mulScrollDragging = false; mulScrollMoved = false; }
  if (hsScrollDragging) { hsScrollDragging = false; hsScrollMoved = false; }

  // Aufgeschobener Skip: Feder wurde im Flug beruehrt. Jetzt beim Loslassen ausfuehren -
  // aber nur wenn ALLE Finger weg sind (kein zweiter Finger = keine Lupe war im Spiel).
  if (skipPending && (!e.touches || e.touches.length === 0)) {
    skipPending = false;
    if (gameState === S.FLYING) {
      wasSkipped = true; ballFlightProgress = 1;
      updateBallPosition(1); onImpact();
    }
    return;
  }

  // Intro-Start: Vollbild beim Loslassen (touchend) anfordern - hier akzeptieren
  // die mobilen Browser die Geste zuverlaessig. Danach ins Spiel wechseln.
  if (introStartPending && gameState === S.INTRO) {
    introStartPending = false;
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
    lockPortrait();
    gameState = S.IDLE;
    return;
  }

  if (gameState === S.IDLE) {                             // Z.1752
    if (isDraggingSlider) { isDraggingSlider = false; saveGameState(); return; }
    if (isDraggingDiffSlider) { isDraggingDiffSlider = false; saveGameState(); return; }
  }
  if (gameState === S.CHARGING) releaseBall();            // Z.1764

  // Absicherung ("Notnagel"): Falls Vollbild fehlt (z.B. nach App-Wechsel, wo das
  // Vordergrund-Signal vom Browser nicht als Geste akzeptiert wurde), beim echten
  // Loslassen wiederherstellen. Greift NUR wenn kein Vollbild aktiv ist, stoert also
  // den Normalfall nicht. Nicht bei simulierten Demo-Klicks (sonst Ruckeln im Film).
  if (!e.__demo && isPhone() &&
      !document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement) {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
    lockPortrait();
  }
}

function updateSliderValue(touchX) {                      // Z.1984
  const nx = Math.min(1, Math.max(0, (touchX - sliderX)/sliderWidth));
  sliderValue = 1 + nx*299;
  flightDuration = Math.floor(sliderValue*1000);
}

function updateDifficultySliderValue(touchX) {            // Z.1991
  const nx = Math.min(1, Math.max(0, (touchX - diffSliderX)/diffSliderWidth));
  const newDifficulty = Math.min(4, Math.max(0, Math.floor(nx*4)));
  if (newDifficulty === difficulty) return;

  // Z.1997-1999: Dornanzahl auf neuem Level pruefen
  const newDornCount = newDifficulty===0?1:newDifficulty===1?2:newDifficulty===2?3:newDifficulty===3?4:5;

  // Z.2000-2001 im Original:
  //   val combo = findValidDividerCombination(score, newDornCount)
  //   if (combo != null) { ... }
  // Der Rueckgabetyp ist List<Int>, nicht List<Int>? - combo ist also NIE null.
  // Die Bedingung ist immer wahr, der else-Zweig ab Z.2008 ist toter Code.
  // 1:1 uebersetzt heisst das: immer wechseln, nie fragen.
  const savedDiff = difficulty;
  difficulty = newDifficulty;
  const combo = findValidDividerCombination(score, newDornCount);
  difficulty = savedDiff;

  if (combo !== null) {                                   // Z.2001 - immer wahr
    difficulty = newDifficulty;
    updateActiveDornCount();
    updateAvailableDividers();
    positionDorns();
    saveGameState();
  } else {                                                // Z.2008 - unerreichbar
    let adjustedScore = score, found = false;
    for (let delta = 1n; delta <= 20n; delta++) {
      const cands = [score + delta, score - delta];
      for (const candidate of cands) {
        if (candidate > 0n) {
          const sd = difficulty;
          difficulty = newDifficulty;
          const c = findValidDividerCombination(candidate, newDornCount);
          difficulty = sd;
          if (c !== null) { adjustedScore = candidate; found = true; break; }
        }
      }
      if (found) break;
    }
    pendingDifficulty = newDifficulty;
    pendingScoreAdjustment = adjustedScore;
    gameState = S.CONFIRM_DIFFICULTY;
  }
}

// ===============================================================
//  ANLEITUNGSFILM
//  Ein Drehbuch aus Zeigerbewegungen und Klicks. Die Klicks laufen
//  durch dieselbe onDown-Funktion wie echte Eingaben - der Film
//  zeigt also das echte Spiel, nichts Nachgestelltes.
//  Gespielt wird auf einer Kopie des Zustands: Score, Runde und
//  Bestenliste bleiben unberuehrt.
// ===============================================================

let demoScript = [];        // {t, type, x, y}
let demoIndex = 0;
let demoPointer = { x: 0, y: 0, visible: false, pressed: false };
let demoSaved = null;


// Der Film loest die Runde: er rechnet aus, wieviele Kugeln fehlen,
// waehlt den groessten passenden Multiplikator und sammelt eine Kugel.
// Wiederholt sich, bis die Zahl genau stimmt - wie beim echten Spielen.
let demoPlan = [];      // Liste der noch noetigen Multiplikatoren

function demoBuildPlan() {
  demoPlan = [];
  const totalDivisor = prodB(dornDividers);
  if (totalDivisor <= 0n || score % totalDivisor !== 0n) return;
  let rest = Number(totalDivisor);        // so viele Kugeln braucht es
  const werte = multiplierButtons.map(m => m.value).sort((a,b) => b-a);
  for (const m of werte) {
    while (rest >= m) { demoPlan.push(m); rest -= m; }
  }
  for (let i = 0; i < rest; i++) demoPlan.push(1);   // Rest einzeln
}

function demoSolveStep() {
  if (!demoPlan.length) return;
  const m = demoPlan.shift();
  const totalDivisor = prodB(dornDividers);
  if (totalDivisor <= 0n || score % totalDivisor !== 0n) return;
  const want = score / totalDivisor;

  // passenden Multiplikator anklicken (x1 = kein Multiplikator)
  if (m > 1) {
    const b = multiplierButtons.filter(x => x.value === m)[0];
    if (b) {
      demoPointer.x = b.x + b.width/2; demoPointer.y = b.y;
      demoTap(demoPointer.x, demoPointer.y);
    }
  } else if (currentMultiplier !== 1) {
    const b = multiplierButtons.filter(x => x.value === currentMultiplier)[0];
    if (b) {   // nochmal klicken schaltet zurueck auf 1
      demoPointer.x = b.x + b.width/2; demoPointer.y = b.y;
      demoTap(demoPointer.x, demoPointer.y);
    }
  }
  // dann die richtige Kugel
  const ball = numberPool.filter(n => n.value === want)[0];
  if (ball) {
    demoPointer.x = ball.x; demoPointer.y = ball.y;
    later(() => demoTap(ball.x, ball.y), 300);
  }
}

function demoTapWrong() {
  const totalDivisor = prodB(dornDividers);
  if (totalDivisor <= 0n || score % totalDivisor !== 0n) return;
  const want = score / totalDivisor;
  const wrong = numberPool.filter(n => n.value !== want)[0];
  if (!wrong) return;

  // 1. Zeiger zur falschen Kugel und 1. Tipp
  demoPointer.x = wrong.x; demoPointer.y = wrong.y;
  demoTap(wrong.x, wrong.y);

  // 2. Kurze Pause, dann 2. Tipp auf dieselbe falsche Kugel
  setTimeout(() => {
    if (!demoActive && !demoSaved) return;
    demoPointer.x = wrong.x; demoPointer.y = wrong.y;
    demoTap(wrong.x, wrong.y);
  }, 1000);

  // 3. Pause, dann erste gesammelte Kugel aus Kollektion entfernen
  setTimeout(() => {
    if (!demoActive && !demoSaved) return;
    demoPointer.x = 90; demoPointer.y = 230;
    demoTap(90, 230);
  }, 2200);

  // 4. Kurze Pause, zweite gesammelte Kugel entfernen
  setTimeout(() => {
    if (!demoActive && !demoSaved) return;
    demoPointer.x = 90; demoPointer.y = 230;
    demoTap(90, 230);
  }, 3200);
}

function demoAt(t, type, x, y) { demoScript.push({ t, type, x, y }); }

function buildDemoScript() {
  demoScript = [];
  demoIndex = 0;

  // Zeiten in SPIELZEIT (ms). Bei 5x Tempo sind 35s Film = 7s echt.
  // Ablauf wie im echten Spiel: erst laden, dann waehrend des Flugs
  // die Dornen lesen und die Loesung eingeben, zum Schluss den Ball
  // per Federtipp durchspringen lassen.

  // 1. Feder halten -> Anzeige faellt von 5m0s auf rund 1m
  demoAt( 1000, 'move', springX, springY);
  demoAt( 2000, 'down', springX, springY);
  demoAt( 5200, 'up',   springX, springY);            // ~1 Min Flugzeit

  // 2. Waehrend des Flugs: Dornen antippen, Teiler werden sichtbar
  for (let i = 0; i < Math.min(5, dornPositions.length); i++) {
    const d = dornPositions[i];
    demoAt( 7000 + i*2000, 'move', d[0], d[1]);
    demoAt( 7800 + i*2000, 'tap',  d[0], d[1]);
  }

  // 3. Falsche Zahl zweimal sammeln und wieder entfernen
  //    (laeuft in echter Zeit via setTimeout, damit es langsam genug sichtbar ist)
  demoAt(16000, 'wrong', 0, 0);

  // 4. Loesen: Multiplikator fuer Multiplikator, bis die Zahl exakt stimmt.
  demoAt(24000, 'plan', 0, 0);
  for (let i = 0; i < 20; i++) demoAt(24500 + i*600, 'solve', 0, 0);

  // 5. Ball durchspringen lassen
  demoAt(38000, 'move', springX, springY);
  demoAt(39000, 'tap',  springX, springY);            // Skip -> Aufspaltung

  // 6. Kugeln fallen, Ergebnis erscheint
  demoAt(44000, 'end', 0, 0);
}

function startDemo() {
  // Zustand sichern - VOLLSTAENDIG, damit eine laufende Runde exakt eingefroren
  // und danach an derselben Stelle fortgesetzt werden kann.
  demoSaved = {
    score, round, displayScore, displayRound, difficulty, gameState,
    sliderValue, collectedNumbers, numberPool, bowlPieces, activePieces,
    currentMultiplier, dornDividers, activeDornCount, highscores,
    // Flug-/Zeit-/Animationswerte fuer echtes Pausieren:
    ballX, ballY, ballFlightStartTime, ballFlightProgress, flightDuration,
    springCompression, chargingStartTime, currentDornIndex, animationStartTime,
    wasSkipped, proCountdownActive, proCountdownStartTime,
    tappedDornIndex, tappedDornShowUntil, pendingDifficulty, pendingScoreAdjustment,
    // Zeitpunkt der Pause (echte Uhr) - fuer die Zeit-Verschiebung beim Fortsetzen:
    pauseRealTime: Date.now()
  };
  // Film-Szenario: Level 20 in Legend - 5 Dornen, Score 50.000.
  // Die Teiler ergeben 1000 Kugeln a 50. Ohne Multiplikator muesste
  // man 1000 mal klicken - mit einem x1000-Klick reicht EINE Kugel.
  // Genau dafuer sind die Multiplikatoren da, und genau das zeigt der Film.
  score = 7308875104n; round = 20; displayScore = 7308875104n; displayRound = 20;
  difficulty = 4;                       // Legend
  sliderValue = 300;                    // Maximum - so sieht man die Zeit
  flightDuration = 300000;              // beim Federhalten deutlich sinken
  collectedNumbers = []; numberPool = []; bowlPieces = []; activePieces = [];
  currentMultiplier = 1;
  updateExpansion();                    // round=20 -> Reihe 4 aktiv (ab R15), Collection noch klein (erst ab R21)
  isInitialized = false; initializePositions();
  activeDornCount = 5;                  // Legend, Runde 20 -> 5 Dornen (nach Init setzen)
  positionDorns();
  // Eine Kombination ohne 1er-Dornen suchen - die teilen ja nichts.
  // In Legend duerfen die Teiler auch groesser als 9 sein (Primfaktoren).
  dornDividers = null;
  for (let t = 0; t < 400; t++) {
    const c = findValidDividerCombination(score, activeDornCount);
    if (score % prodB(c) === 0n && c.every(d => d > 1)) { dornDividers = c; break; }
  }
  if (!dornDividers) dornDividers = findValidDividerCombination(score, activeDornCount);
  gameState = S.IDLE;
  ballX = springX; ballY = getBallOnSpringY();
  springCompression = 0;

  buildDemoScript();
  demoPointer.visible = true;
  demoPointer.pressed = false;
  demoPointer.x = springX; demoPointer.y = springY;

  demoClockStart = Date.now();
  demoRealStart = Date.now();
  demoActive = true;
}

function stopDemo() {
  demoActive = false;
  demoPointer.visible = false;
  if (demoSaved) {
    // War beim Oeffnen der Anleitung eine Runde aktiv? (nicht IDLE/RESULT etc.)
    const wasInRound = (demoSaved.gameState === S.CHARGING ||
                        demoSaved.gameState === S.FLYING ||
                        demoSaved.gameState === S.ANIMATING ||
                        demoSaved.gameState === S.EVALUATING);

    score = demoSaved.score; round = demoSaved.round;
    displayScore = demoSaved.displayScore; displayRound = demoSaved.displayRound;
    difficulty = demoSaved.difficulty;
    sliderValue = demoSaved.sliderValue;
    collectedNumbers = demoSaved.collectedNumbers;
    numberPool = demoSaved.numberPool;
    bowlPieces = demoSaved.bowlPieces;
    activePieces = demoSaved.activePieces;
    currentMultiplier = demoSaved.currentMultiplier;
    dornDividers = demoSaved.dornDividers;
    activeDornCount = demoSaved.activeDornCount;
    highscores = demoSaved.highscores;

    updateActiveDornCount();
    updateExpansion();
    isInitialized = false; initializePositions();
    updateAvailableDividers();
    positionDorns();

    if (wasInRound) {
      // ---- Pausierte Runde exakt fortsetzen ----
      // Alle Flug-/Animationswerte zuruecksetzen
      flightDuration = demoSaved.flightDuration;
      ballX = demoSaved.ballX; ballY = demoSaved.ballY;
      ballFlightProgress = demoSaved.ballFlightProgress;
      springCompression = demoSaved.springCompression;
      currentDornIndex = demoSaved.currentDornIndex;
      wasSkipped = demoSaved.wasSkipped;
      proCountdownActive = demoSaved.proCountdownActive;
      tappedDornIndex = demoSaved.tappedDornIndex;
      tappedDornShowUntil = demoSaved.tappedDornShowUntil;
      pendingDifficulty = demoSaved.pendingDifficulty;
      pendingScoreAdjustment = demoSaved.pendingScoreAdjustment;

      // Zeit-Verschiebung: um wie viel echte Zeit war pausiert?
      // now() ist im Normalspiel Date.now(), also verschieben wir die
      // absoluten Start-Zeitstempel um die Pausendauer nach vorn -> die
      // Uhr zaehlt exakt dort weiter, wo sie eingefroren wurde.
      const pausedMs = Date.now() - demoSaved.pauseRealTime;
      ballFlightStartTime = demoSaved.ballFlightStartTime + pausedMs;
      chargingStartTime = demoSaved.chargingStartTime + pausedMs;
      animationStartTime = demoSaved.animationStartTime + pausedMs;
      proCountdownStartTime = demoSaved.proCountdownStartTime + pausedMs;

      gameState = demoSaved.gameState;   // z.B. FLYING - Runde laeuft weiter
      demoSaved = null;
      removeFlashes = [];   // nur optische Aufflamm-Effekte der Demo verwerfen
      return;                            // NICHT auf IDLE zuruecksetzen!
    }

    demoSaved = null;
  }
  // Anleitung war ausserhalb einer Runde -> wie bisher zurueck auf IDLE
  updateActiveDornCount();
  updateExpansion();
  isInitialized = false; initializePositions();
  updateAvailableDividers();
  positionDorns();
  gameState = S.IDLE;
  ballX = springX; ballY = getBallOnSpringY();
  springCompression = 0;
  removeFlashes = [];   // nur optische Aufflamm-Effekte der Demo verwerfen
  saveGameState();   // echten Zustand zurueckschreiben
}

// Simulierter Klick - laeuft durch die echte Eingabe
function demoTap(x, y) {
  demoPointer.pressed = true;
  onDown({ preventDefault(){}, clientX: 0, clientY: 0, __demo: { x, y } });
  // Skip liegt jetzt auf onUp -> ein Demo-Tap muss auch loslassen, sonst bliebe
  // skipPending haengen und der Ball floege doppelt. touches:[] = alle Finger weg.
  onUp({ preventDefault(){}, touches: [], __demo: { x, y } });
  setTimeout(() => { demoPointer.pressed = false; }, 60);
}

function updateDemo() {
  if (!demoActive) return;
  const t = now() - demoClockStart;

  while (demoIndex < demoScript.length && demoScript[demoIndex].t <= t) {
    const step = demoScript[demoIndex];
    demoIndex++;

    if (step.type === 'end') { demoActive = false; return; }

    if (step.type === 'move') {
      if (step.x || step.y) { demoPointer.x = step.x; demoPointer.y = step.y; }
      continue;
    }
    if (step.type === 'tap') {
      demoPointer.x = step.x; demoPointer.y = step.y;
      demoTap(step.x, step.y);
      continue;
    }
    if (step.type === 'down') {
      demoPointer.x = step.x; demoPointer.y = step.y;
      demoPointer.pressed = true;
      onDown({ preventDefault(){}, __demo: { x: step.x, y: step.y } });
      continue;
    }
    if (step.type === 'up') {
      demoPointer.pressed = false;
      onUp({ preventDefault(){}, __demo: { x: step.x, y: step.y } });
      continue;
    }
    if (step.type === 'wrong') { demoTapWrong(); continue; }
    if (step.type === 'plan') { demoBuildPlan(); continue; }
    if (step.type === 'solve') {
      // Der Film loest die Runde so, wie ein Spieler es tun wuerde:
      // groesster passender Multiplikator zuerst, dann der Rest.
      demoSolveStep();
      continue;
    }
  }
}

function drawDemoPointer() {
  if (!demoPointer.visible) return;
  const x = demoPointer.x, y = demoPointer.y;

  // Schatten beim Bewegen
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.arc(x + 4, y + 5, 26, 0, Math.PI*2); ctx.fill();

  // Zeiger
  ctx.fillStyle = demoPointer.pressed ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(x, y, 24, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(x, y, 24, 0, Math.PI*2); ctx.stroke();

  // Klick-Blitz
  if (demoPointer.pressed) {
    ctx.strokeStyle = 'rgba(255,215,0,0.9)'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(x, y, 44, 0, Math.PI*2); ctx.stroke();
  }
}

function drawDemoButton() {
  if (demoActive) return;
  const bx = W - 90, by = 70, r = 30;
  // Kugel
  const g = ctx.createRadialGradient(bx - r*0.3, by - r*0.3, 0, bx, by, r);
  g.addColorStop(0, '#4a90d9'); g.addColorStop(0.6, '#1a5fa8'); g.addColorStop(1, '#0d3b6e');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
  // Glanzpunkt
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(bx - r*0.35, by - r*0.35, r*0.28, 0, Math.PI*2); ctx.fill();
  // Rand
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.stroke();
  // Fragezeichen
  ctx.font = 'bold ' + fs(54) + 'px Arial'; ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 6;
  ctx.fillText('?', bx, by + 3);
  ctx.shadowBlur = 0;
}

// ===============================================================
//  INTRO
// ===============================================================

function startIntro() {
  gameState = S.INTRO;
  introStartTime = performance.now();
  introBalls = [];
}

function updateIntro() {
  const elapsed = performance.now() - introStartTime;
  const t = Math.min(elapsed / INTRO_DURATION, 1);

  // Hintergrund
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;

  // Animations-Phasen: 0-0.3 eine Kugel fällt, 0.3-0.6 zerfällt in 2,
  // 0.6-0.8 zerfällt in 4, 0.8-1.0 zerfällt in 8 → Standbild
  function drawBall(x, y, r, alpha) {
    const g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, 0, x, y, r);
    g.addColorStop(0, `rgba(100,160,220,${alpha})`);
    g.addColorStop(0.6, `rgba(30,100,180,${alpha})`);
    g.addColorStop(1, `rgba(10,50,120,${alpha})`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = `rgba(255,215,0,${alpha})`; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
    // Glanz
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.5})`;
    ctx.beginPath(); ctx.arc(x - r*0.3, y - r*0.3, r*0.25, 0, Math.PI*2); ctx.fill();
  }

  if (t < 0.25) {
    // Phase 1: große Kugel fällt von oben rein
    const fallT = t / 0.25;
    const ballY2 = cy * 0.3 + fallT * (cy - cy * 0.3);
    drawBall(cx, ballY2, 80, 1);

  } else if (t < 0.5) {
    // Phase 2: zerfällt in 2
    const splitT = (t - 0.25) / 0.25;
    const spread = splitT * 120;
    drawBall(cx - spread, cy, 55, 1);
    drawBall(cx + spread, cy, 55, 1);

  } else if (t < 0.75) {
    // Phase 3: jede zerfällt in 2 → 4 Kugeln
    const splitT = (t - 0.5) / 0.25;
    const spreadX = 120 + splitT * 80;
    const spreadY = splitT * 100;
    const r = 38;
    drawBall(cx - spreadX, cy - spreadY, r, 1);
    drawBall(cx - spreadX, cy + spreadY, r, 1);
    drawBall(cx + spreadX, cy - spreadY, r, 1);
    drawBall(cx + spreadX, cy + spreadY, r, 1);

  } else {
    // Phase 4: 8 Kugeln → Standbild
    const r = 26;
    const positions = [
      [cx - 200, cy - 160], [cx - 60, cy - 200], [cx + 60, cy - 200], [cx + 200, cy - 160],
      [cx - 200, cy + 160], [cx - 60, cy + 200], [cx + 60, cy + 200], [cx + 200, cy + 160],
    ];
    for (const [bx, by] of positions) drawBall(bx, by, r, 1);

    // Titel
    ctx.font = 'bold ' + fs(64) + 'px Arial';
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 12;
    ctx.fillText('Division Ball', cx, cy - 20);

    // Start
    ctx.font = 'bold ' + fs(36) + 'px Arial';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Start', cx, cy + 40);
    ctx.shadowBlur = 0;
  }
}

// ===============================================================
//  HAUPTSCHLEIFE
// ===============================================================

function loop() {
  const tNow = now();

  // Intro-Sequenz
  if (gameState === S.INTRO) {
    updateIntro();
    requestAnimationFrame(loop);
    return;
  }

  if (gameState === S.CHARGING) {                         // Z.2046
    const elapsed = tNow - chargingStartTime;
    springCompression = Math.min(1, elapsed/maxChargeTime);
    if (tNow - dividerRattleTimer > dividerRattleInterval) {
      dornDividers = findValidDividerCombination(score, activeDornCount);
      dividerRattleTimer = tNow;
    }
  }

  if (gameState === S.FLYING) {                           // Z.2087
    const elapsed = tNow - ballFlightStartTime;
    ballFlightProgress = Math.min(1, elapsed/flightDuration);
    updateBallPosition(ballFlightProgress);

    if (difficulty >= 3 && !proCountdownActive && dornPositions.length) {   // Z.2096
      const last = dornPositions[dornPositions.length-1];
      const dx = ballX - last[0], dy = ballY - last[1];
      if (Math.sqrt(dx*dx + dy*dy) < 80) {
        proCountdownActive = true; proCountdownStartTime = tNow;
      }
    }
    if (proCountdownActive && tNow - proCountdownStartTime >= proCountdownDuration) {
      proCountdownActive = false; onImpact();
    } else if (ballFlightProgress >= 1) {
      onImpact();
    }
  }

  updateDemo();
  onDraw();
  requestAnimationFrame(loop);
}

cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('touchstart', onDown, { passive:false });
cv.addEventListener('touchmove', onMove, { passive:false });
cv.addEventListener('touchend', onUp, { passive:false });
window.addEventListener('resize', resize);
window.addEventListener('beforeunload', saveGameState);
document.addEventListener('visibilitychange', function(){
  if (document.hidden) { saveGameState(); return; }
  // Zurueck im Vordergrund (z.B. aus anderer App): kurz warten, damit die App wirklich
  // "angekommen" ist und die Fenstergroesse stabil steht, DANN erst die Befehle feuern
  // (Vollbild wiederherstellen + neu vermessen/positionieren). Das resize() korrigiert
  // die verschobene Optik.
  setTimeout(function(){
    if (isPhone() && !document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && gameState !== S.INTRO) {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
      lockPortrait();
    }
    resize();
  }, 150);
});
// Vollbild: nach dem Wechsel kurz warten bis Browser fertig ist, dann neu skalieren
document.addEventListener('fullscreenchange',       () => setTimeout(resize, 400));
document.addEventListener('webkitfullscreenchange', () => setTimeout(resize, 400));
document.addEventListener('mozfullscreenchange',    () => setTimeout(resize, 400));

resize();
loadGameState();
loadHighscores();
dornDividers = findValidDividerCombination(score, activeDornCount);
startIntro();
loop();
</script>
