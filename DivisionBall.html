"use strict";
// ===============================================================
//  DivisionBall  -  1:1-Portierung von GameView.kt

// ===============================================================

const cv = document.getElementById('c'), ctx = cv.getContext('2d');

// ---------------------------------------------------------------
//  ZEITBASIS
//  Das Spiel liest die Zeit ueber now(). Im normalen Spiel ist das
//  einfach now(). Im Anleitungsfilm laeuft eine eigene Uhr
//  fuenfmal so schnell - dadurch spielt sich eine 35-Sekunden-Runde
//  in 7 Sekunden ab, ohne dass die Spiellogik etwas davon merkt.
// ---------------------------------------------------------------
const DEMO_SPEED = 5;
let demoActive = false;
let demoRealStart = 0;      // echte Zeit beim Filmstart
let demoClockStart = 0;     // virtuelle Zeit beim Filmstart

function now() {
  if (!demoActive) return Date.now();
  return demoClockStart + (Date.now() - demoRealStart) * DEMO_SPEED;
}

// Bildschirm auf Hochformat sperren (wo der Browser es erlaubt, v.a. im Vollbild).
// Verhindert das Drehen ins Querformat, ohne am Skalierungssystem etwas zu aendern.
function lockPortrait() {
  try {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch(()=>{});
    }
  } catch (e) {}
}

// Verzoegerungen sind in SPIELZEIT gedacht. Im Film muessen sie
// entsprechend kuerzer sein, sonst haengt das Ergebnis hinterher.
function later(fn, ms) {
  return setTimeout(fn, demoActive ? ms / DEMO_SPEED : ms);
}

const S = { INTRO:9, IDLE:0, CHARGING:1, FLYING:2, ANIMATING:3, EVALUATING:4,
            RESULT:5, CONFIRM_DIFFICULTY:6, BONUS:7, HIGHSCORE:8 };

const INTRO_DURATION = 1500; // ms

let bonusSecondsLeft = 0, bonusPointsAdded = 0n, bonusTotal = 0n, bonusTimer = null;

let W = 0, H = 0, isInitialized = false;
let canvasRect = null;   // eigene Canvas-Position/-Groesse (statt getBoundingClientRect)
let fontScale = 1;
function fs(size) { return Math.round(size * fontScale); }

let springCompression = 0, chargingStartTime = 0;
const maxChargeTime = 2000;

let activeDornCount = 1, dornDividers = [], dornPositions = [];
let dividerRattleTimer = 0;
const dividerRattleInterval = 100;
let availableDividers = [];
let tappedDornIndex = -1, tappedDornShowUntil = 0;

let ballX = 0, ballY = 0;
const ballRadius = 28;
let ballFlightStartTime = 0, ballFlightProgress = 0;

let activePieces = [], bowlPieces = [];
let currentDornIndex = 0, animationStartTime = 0, wasSkipped = false;

let wasSuccess = false, isResetting = false;
let failCorrectAnswer = 0n, failScoreBefore = 0n, failCollected = [];

let proCountdownActive = false, proCountdownStartTime = 0;
const proCountdownDuration = 1000;

let segment1EndY = 0, segment2EndX = 0;
let bankLeft = 0, bankTop = 0, bankRight = 0, bankBottom = 0;

let numberPool = [], collectedNumbers = [];
let currentMultiplier = 1, multiplierButtons = [];

// --- Erweiterung ab Runde 20/25: mehr Multiplikator-Reihen + groessere Collection Area ---
let expandedLayout = false;      // true, sobald >3 Multiplikator-Reihen aktiv sind
let multiplierRowCount = 3;      // 3, 4 oder 5 sichtbare Reihen
let multiplierScrollY = 0;       // Scroll-Offset des Multiplikator-Bereichs
let multiplierMaxScroll = 0;     // maximaler Scroll-Weg (wird beim Zeichnen gesetzt)
let mulScrollDragging = false, mulScrollStartY = 0, mulScrollStartOffset = 0, mulScrollMoved = false;
let unlockAnimUntil = 0, unlockAnimText = '';   // Freischalt-Animation (dezent)

// Rotes Aufflammen beim Entfernen einer gesammelten Zahl (einmaliger Puls, kein Blinken).

let removeFlashes = [];

// Zwei-Finger-Lupe: kurzzeitiger optischer Zoom, aendert das Spiel-Layout NICHT.
// zoomActive: Lupe laeuft (2 Finger). zoomFactor: aktuelle Vergroesserung (stufenlos).

// Punkte-Erklaerung am Ende der Anleitung (PLATZHALTER - Text frei aenderbar).
// Erscheint in den letzten Sekunden des Anleitungsfilms.
const demoInfoTitle = 'Info';
const demoInfoLines = [

];

let sliderX = 0, sliderY = 0, sliderWidth = 0, sliderValue = 120;
let isDraggingSlider = false;

let highscores = [], highscoreSort = 0;
let highscoreScrollY = 0;          // Scroll-Offset der Bestenliste

const DIFF_LABELS = ['Easy','Medium','Hard','Pro','Legend'];

// BigInt: Kotlin nutzt Long. Ohne BigInt waere ab Runde 47 Schluss.
const B = v => BigInt(v);
function bMin(a,b){ return a < b ? a : b; }
function bMax(a,b){ return a > b ? a : b; }

// ===============================================================
//  MATHEMATIK  (Z. 432-557)
// ===============================================================

function findCleanDivisors(number, maxDivisor) {          // Z.440
  const out = [];
  for (let d = 2; d <= maxDivisor; d++) if (number % B(d) === 0n) out.push(d);
  return out;
}

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function shuffle(a){
  const r = a.slice();
  for (let i = r.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    const t = r[i]; r[i] = r[j]; r[j] = t;
  }
  return r;
}
function prodB(a){ return a.reduce((x,y) => x * B(y), 1n); }

function updateAvailableDividers() {                      // Z.432
  availableDividers = findCleanDivisors(score, 9);
  if (availableDividers.length === 0) availableDividers = [2];
}

function primeFactors(n) {                                // Z.468
  const factors = [];
  let remaining = n, f = 2n;
  while (f*f <= remaining && f <= 9999n) {
    while (remaining % f === 0n) { factors.push(Number(f)); remaining /= f; }
    f++;
  }
  if (remaining > 1n && remaining <= 9n) factors.push(Number(remaining));
  return factors;
}

function groupFactors(factors, slots) {                   // Z.480
  if (factors.length === 0) return new Array(slots).fill(1);
  const pool = shuffle(factors);
  const result = [];
  if (pool.length >= slots) {
    while (pool.length > 0 && result.length < slots) {
      let group = pool.shift();
      while (pool.length > 0 && result.length + pool.length + 1 > slots) {
        const f = pool[0];
        if (group * f <= 9) { group *= f; pool.shift(); } else break;
      }
      result.push(group);
    }
  } else {
    for (const f of pool) result.push(f);
  }
  while (result.length < slots) result.push(1);
  return shuffle(result);
}

function findValidDividerCombination(sc, dornCount) {     // Z.450
  const useLegend = (difficulty === 4);

  if (!useLegend) {
    if (dornCount === 1) {
      const av = findCleanDivisors(sc, 9);
      return av.length ? [pick(av)] : [2];
    }
    for (let t = 0; t < 300; t++) {
      const combo = [];
      for (let i = 0; i < dornCount; i++) combo.push(2 + Math.floor(Math.random()*8));
      if (sc % prodB(combo) === 0n) return combo;
    }
    return new Array(dornCount).fill(2);                  // Z.463
  }

  function alleDivisorenAnsatz(sc, slots) {               // Z.501
    const divs = findCleanDivisors(sc, 9);
    if (divs.length === 0) return null;
    for (let t = 0; t < 100; t++) {
      const combo = [];
      let remaining = sc;
      for (let i = 0; i < slots; i++) {
        const av = findCleanDivisors(remaining, 9);
        if (av.length === 0) combo.push(1);
        else { const c = pick(av); combo.push(c); remaining /= B(c); }
      }
      if (sc % prodB(combo) === 0n) return shuffle(combo);
    }
    return null;
  }

  function primfaktorAnsatz(sc, slots) {                  // Z.518
    for (let t = 0; t < 50; t++) {
      const combo = groupFactors(primeFactors(sc), slots);
      if (sc % prodB(combo) === 0n) return combo;
    }
    return null;
  }

  const result = Math.random() < 0.5
    ? (alleDivisorenAnsatz(sc, dornCount) || primfaktorAnsatz(sc, dornCount))
    : (primfaktorAnsatz(sc, dornCount) || alleDivisorenAnsatz(sc, dornCount));
  if (result) return result;

  const combo = [];                                       // Z.534 Greedy
  let remaining = sc;
  for (let i = 0; i < dornCount; i++) {
    const divs = findCleanDivisors(remaining, 9);
    if (divs.length) { const c = pick(divs); combo.push(c); remaining /= B(c); }
    else combo.push(1);
  }
  if (sc % prodB(combo) === 0n) return shuffle(combo);

  const divs = findCleanDivisors(sc, 9);                  // Z.549
  if (divs.length) {
    const r = new Array(dornCount).fill(1);
    r[0] = pick(divs);
    return shuffle(r);
  }
  return new Array(dornCount).fill(1);
}

// ===============================================================
//  LAYOUT  (Z. 266-430)
// ===============================================================

// Das Original laeuft auf einem Handy mit rund 1080x2400 Pixeln.
// Alle Positionen sind prozentual (bankTop = H*0.45), ABER Roehre (80px),
// Dornabstand (110px), Sammelfach (180..380) und alle Schriftgroessen sind
// feste Pixelwerte - abgestimmt auf diese Aufloesung.
// Deshalb wird intern IMMER in 1080x2400 gezeichnet und das Ergebnis
// auf das Fenster skaliert. So bleibt jedes Verhaeltnis wie im Original.
// Das Original-Handy hat 1080x2400. Auf einem Querformat-Bildschirm ist das
// unnoetig lang: 44% der Hoehe sind Leerraum (zwischen Sammelfach und Bahn,
// zwischen Schale und unterem Rand). BASE_H gestaucht - alle prozentualen
// Positionen ruecken mit, die festen Pixelmasse bleiben. Auf Kollisionen
// geprueft: bis hinunter zu 1500 ueberlappt nichts.
const BASE_W = 900, BASE_H = 1560;

// Handy oder Rechner? Ein schmales Hochformat-Fenster ist ein Handy.
function isPhone() {
  // Touch-Gerät erkennen: UserAgent, Touch-Punkte, oder schmales Hochformat-Fenster
  const ua = navigator.userAgent || '';
  const isMobileUA = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(ua);
  const isTouch = navigator.maxTouchPoints > 1;
  const w = window.innerWidth, h = window.innerHeight;
  const isNarrow = w <= 1024 && h > w;
  return isMobileUA || (isTouch && isNarrow);
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const winW = window.innerWidth;
  const winH = window.innerHeight;
  const phone = isPhone();

  document.body.className = phone ? 'phone' : 'desktop';

  let cssW, cssH;
  if (phone) {
    const scale = Math.min(winW / BASE_W, winH / BASE_H);
    cssW = Math.floor(BASE_W * scale);
    cssH = Math.floor(BASE_H * scale);
  } else {
    cssH = 640;
    cssW = Math.floor(cssH * BASE_W / BASE_H);
  }

  W = BASE_W; H = BASE_H;

  if (phone) {
    // Echte Hardware-Pixel nehmen - jeder Browser meldet das gleich
    const physicalW = screen.width * dpr;
    const physicalH = screen.height * dpr;
    const physicalScale = Math.min(physicalW / BASE_W, physicalH / BASE_H);
    fontScale = Math.min(2.0, 1 / physicalScale * 1.0);
  } else {
    fontScale = 1;
  }

  cv.width = Math.floor(cssW * dpr);
  cv.height = Math.floor(cssH * dpr);
  cv.style.width = cssW + 'px';
  cv.style.height = cssH + 'px';

  if (phone) {
    cv.style.left = Math.floor((winW - cssW) / 2) + 'px';
    cv.style.top  = Math.floor((winH - cssH) / 2) + 'px';
  } else {
    cv.style.left = '';
    cv.style.top = '';
  }

  // Unsere EIGENEN Positions-/Groessenwerte merken. Die Touch-Umrechnung nutzt diese
  // statt getBoundingClientRect(), weil Firefox beim Ein-/Ausblenden der Adressleiste
  // falsche Rect-Werte liefern kann -> Touch waere dann verschoben.
  canvasRect = phone
    ? { left: Math.floor((winW - cssW) / 2), top: Math.floor((winH - cssH) / 2), width: cssW, height: cssH }
    : null;

  const sx = (cssW * dpr) / BASE_W;
  ctx.setTransform(sx, 0, 0, sx, 0, 0);

  isInitialized = false;
  initializePositions();
}

function initializePositions() {                          // Z.266
  if (isInitialized || W <= 0 || H <= 0) return;

  // Reihen-Zustand aus der Runde ableiten (ohne Animation beim Init/Resize).
  // ENTKOPPELT: Multiplikator-Reihen (15/27) und Collection-Vergroesserung (21)
  // sind jetzt drei getrennte Schwellen.
  multiplierRowCount = (round >= 27) ? 5 : (round >= 15) ? 4 : 3;
  expandedLayout = (round >= 21);   // Collection Area groesser ab Runde 21

  // Im erweiterten Layout beginnt die Bank etwas tiefer (Collection Area groesser),
  // dafuer wird die vertikale Flugbahn gestaucht (Ecke rutscht nach unten),
  // damit Dorn 6 wieder auf der Ecke sitzt und die Bahn horizontal gleich bleibt.
  const bankTopFrac = expandedLayout ? 0.52 : 0.45;

  bankLeft = W*0.15; bankRight = W*0.85;
  bankTop = H*bankTopFrac;  bankBottom = H*0.75;
  springX = W*0.12;  springY = H*0.88;
  bowlX = W*0.88;    bowlY = H*0.88;

  // Ecke (Uebergang senkrecht->horizontal). Im erweiterten Layout tiefer gesetzt,
  // damit die vertikale Roehre kuerzer wird und Dorn 6 auf der Ecke landet.
  const cornerBase = expandedLayout ? collectionBottom() + 40 : 380;
  segment1EndY = cornerBase + (bankTop - cornerBase)/2;
  segment2EndX = W*0.88;
  ballX = springX; ballY = getBallOnSpringY();
  sliderX = 120; sliderY = 60; sliderWidth = 300;
  diffSliderX = 120; diffSliderY = 120; diffSliderWidth = 300;
  createMultiplierButtons();
  isInitialized = true;
  updateActiveDornCount();
  updateExpansion();
  updateAvailableDividers();
  positionDorns();
}

// Untere Kante der Collection Area - abhaengig davon, ob erweitert (5 Reihen) oder nicht (3).
function collectionBottom() {
  const rows = expandedLayout ? 5 : 3;
  const rowH = 60;
  return 180 + 60 + (rows-1)*rowH + 30;   // slotTop-Bereich + Reihen + Rand
}

function getBallOnSpringY() {                             // Z.2539
  return springY - 50 - 90 - ballRadius - 5;
}

function createMultiplierButtons() {                      // Z.313
  multiplierButtons = [];
  const topY = bankTop + 25, bw = 80, bh = 44;
  const rows = [
    { v:[5,10,20,50,100,200], l:['\u00D75','\u00D710','\u00D720','\u00D750','\u00D7100','\u00D7200'], dy:0 },
    { v:[500,1000,2000,5000,10000,20000], l:['\u00D7500','\u00D71k','\u00D72k','\u00D75k','\u00D710k','\u00D720k'], dy:48 },
    { v:[50000,100000,200000,500000,1000000,5000000], l:['\u00D750k','\u00D7100k','\u00D7200k','\u00D7500k','\u00D71M','\u00D75M'], dy:96 },
    // Reihe 4 (ab Runde 20): Schema 5/10/20/50/100/200/500/1000 laeuft weiter
    { v:[10000000,20000000,50000000,100000000,200000000,500000000], l:['\u00D710M','\u00D720M','\u00D750M','\u00D7100M','\u00D7200M','\u00D7500M'], dy:144 },
    // Reihe 5 (ab Runde 25)
    { v:[1000000000,2000000000,5000000000,10000000000,20000000000,50000000000], l:['\u00D71B','\u00D72B','\u00D75B','\u00D710B','\u00D720B','\u00D750B'], dy:192 }
  ];
  const spacing = (bankRight - bankLeft - 80) / 6;
  const visibleRows = rows.slice(0, multiplierRowCount);
  for (const r of visibleRows)
    for (let i = 0; i < r.v.length; i++)
      multiplierButtons.push({ label:r.l[i], x:bankLeft+40+i*spacing, y:topY+r.dy,
                               width:bw, height:bh, value:r.v[i] });
}

function updateActiveDornCount() {                        // Z.348
  if (difficulty === 4)
    activeDornCount = round<=3?1:round<=6?2:round<=10?3:round<=15?4:round<=20?5:
                      round<=25?6:round<=30?7:round<=35?8:round<=40?9:10;
  else if (difficulty === 3)
    activeDornCount = round<=5?1:round<=10?2:round<=17?3:round<=23?4:round<=30?5:
                      round<=34?6:round<=40?7:round<=44?8:round<=49?9:10;
  else
    activeDornCount = round<=5?1:round<=10?2:round<=20?3:round<=30?4:4+Math.floor((round-30)/10);
}

// Legt anhand der Runde fest, wie viele Multiplikator-Reihen sichtbar sind und
// ob die Collection Area vergroessert ist. ENTKOPPELT: drei getrennte Schwellen.
// Loest bei einer NEUEN Freischaltung die dezente Belohnungs-Animation aus.
function updateExpansion() {
  let rows = 3;
  if (round >= 27) rows = 5;
  else if (round >= 15) rows = 4;
  const nowExpanded = (round >= 21);

  // Animation, wenn eine neue Multiplikator-Reihe ODER die Collection-Vergroesserung
  // gerade freigeschaltet wird.
  if (isInitialized && (rows > multiplierRowCount || (nowExpanded && !expandedLayout))) {
    unlockAnimText = '♥ ♥♥  ♥♥♥   ♥♥♥    ♥♥♥♥';
    unlockAnimUntil = now() + 2200;   // = FADE_IN(550) + HOLD(900) + FADE_OUT(750)
  }
  multiplierRowCount = rows;
  expandedLayout = nowExpanded;
}

function positionDorns() {                                // Z.386
  dornPositions = [];
  const rightX = W*0.88;
  const lowestDornY = bowlY - 150;

  // Die Dorne bilden eine DURCHGEHENDE Kette entlang der Flugbahn - vom Ende der Bahn
  // (unten rechts) rueckwaerts Richtung Feder. Der Abstand ist ueberall gleich, auch
  // ueber die Ecken hinweg, damit keine Spruenge entstehen.
  //
  // Der Abstand richtet sich nach dem senkrechten Abschnitt: 6 Dorne sollen
  // gleichmaessig von unten bis zur Ecke sitzen (Dorn 6 genau auf der Ecke).
  const spanSenkrecht = lowestDornY - segment1EndY;
  const spacing = spanSenkrecht / 5;             // 5 Abstaende zwischen 6 Dornen

  // Laengen der drei Bahnabschnitte (vom Ende rueckwaerts gemessen)
  const lenSenkRechts = spanSenkrecht;                  // unten rechts -> Ecke
  const lenWaagerecht = segment2EndX - springX;         // Ecke -> linke Ecke
  // Danach senkrecht links hinunter Richtung Feder.

  for (let i = 0; i < activeDornCount; i++) {
    const d = i * spacing;                       // Distanz entlang der Bahn ab Dorn 1
    if (d <= lenSenkRechts + 0.5) {
      // senkrechter Abschnitt rechts
      dornPositions.push([rightX, lowestDornY - d]);
    } else if (d <= lenSenkRechts + lenWaagerecht) {
      // waagerechter Abschnitt nach links
      const rest = d - lenSenkRechts;
      dornPositions.push([segment2EndX - rest, segment1EndY]);
    } else {
      // senkrechter Abschnitt links (Richtung Feder)
      const rest = d - lenSenkRechts - lenWaagerecht;
      dornPositions.push([springX, segment1EndY + rest]);
    }
  }
}

// ===============================================================
//  ZEICHNEN
// ===============================================================

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function pathEndY() {
  const maxSenkrecht = Math.min(activeDornCount, 5);       // Z.714
  return maxSenkrecht > 0
    ? (bowlY - 150) - ((maxSenkrecht - 1) * 110) - 60
    : bowlY - 70;
}

function drawTrack() {                                    // Z.692
  const p = new Path2D();
  p.moveTo(springX, springY - 50);
  p.lineTo(springX, segment1EndY);

function ballGrad(x, y, r) {                              // Z.806 - ROT
  const gx = x - r*0.3, gy = y - r*0.3;
  const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, r*1.5);
  g.addColorStop(0, '#FF6B6B'); g.addColorStop(0.6, '#EE5555'); g.addColorStop(1, '#CC3333');
  return g;
}

function drawBall(x, y) {                                 // Z.805
  ctx.fillStyle = ballGrad(x, y, ballRadius);
  ctx.beginPath(); ctx.arc(x, y, ballRadius, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.706)';
  ctx.beginPath(); ctx.arc(x - ballRadius*0.4, y - ballRadius*0.4, ballRadius*0.3, 0, Math.PI*2); ctx.fill();
  ctx.font = 'bold ' + fs(26) + 'px Arial'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.shadowColor='#000'; ctx.shadowBlur=3; ctx.shadowOffsetY=2;
  ctx.fillStyle='#fff';

  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
}

function drawPiece(p) {                                   // Z.831
  ctx.fillStyle = ballGrad(p.x, p.y, p.size);
  ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.706)';
  ctx.beginPath(); ctx.arc(p.x - p.size*0.4, p.y - p.size*0.4, p.size*0.3, 0, Math.PI*2); ctx.fill();
}

function drawBallPieces() {
  for (const p of activePieces) drawPiece(p);
  for (const p of bowlPieces) drawPiece(p);
}

function drawSpring() {                                   // Z.884
  const baseRadius = 50, springHeight = 90, springWidth = 35;
  const stretchOffset = springHeight * springCompression * 0.8;

  const bg = ctx.createRadialGradient(springX, springY, 0, springX, springY, baseRadius);
  bg.addColorStop(0,'#777777'); bg.addColorStop(1,'#555555');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(springX, springY, baseRadius, 0, Math.PI*2); ctx.fill();

  const coils = 8;
  const topY = springY - baseRadius - springHeight;
  const actualHeight = springHeight + stretchOffset;
  const coilHeight = actualHeight / coils;

  const drawCoils = (color, width, ox, oy) => {
    ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap='round';
    for (let i = 0; i < coils; i++) {
      const y = topY + i*coilHeight, nextY = topY + (i+1)*coilHeight;
      ctx.beginPath();
      ctx.moveTo(springX - springWidth + ox, y + oy);
      ctx.bezierCurveTo(
        springX - springWidth*0.5 + ox, y + coilHeight*0.3 + oy,
        springX + springWidth*0.5 + ox, nextY - coilHeight*0.3 + oy,
        springX + springWidth + ox, nextY + oy);
      ctx.stroke();
    }
  };
  drawCoils('#333333', 12, 2, 2);
  drawCoils('#888888', 10, 0, 0);
  drawCoils('#AAAAAA', 6, -3, -2);

  if (gameState === S.CHARGING) {                         // Z.981
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(springX, springY, 12, 0, Math.PI*2); ctx.fill();
  }
}

function drawDorn(x, y, divider) {                        // Z.990
  const radius = 50;
  const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0,'#444444'); g.addColorStop(1,'#222222');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();

  if (divider === 1) {                                    // Z.993
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(x, y, radius*0.75, 0, Math.PI*2); ctx.stroke();
    return;
  }
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4;
  for (let i = 0; i < divider; i++) {                     // Z.1026
    const angle = (360/divider)*i - 90;
    const rad = angle * Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + radius*0.75*Math.cos(rad), y + radius*0.75*Math.sin(rad));
    ctx.stroke();
  }
}

function drawNumberBank() {                               // Z.1097
  const g = ctx.createLinearGradient(bankLeft, bankTop, bankRight, bankBottom);
  g.addColorStop(0,'#16213e'); g.addColorStop(1,'#0f3460');
  ctx.fillStyle = g;
  rr(bankLeft, bankTop, bankRight-bankLeft, bankBottom-bankTop, 20); ctx.fill();
  ctx.strokeStyle = '#0f3460'; ctx.lineWidth = 4;
  rr(bankLeft, bankTop, bankRight-bankLeft, bankBottom-bankTop, 20); ctx.stroke();

  ctx.fillStyle = '#FFD700'; ctx.font = 'bold ' + fs(32) + 'px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('NUMBER BANK', (bankLeft+bankRight)/2, bankTop - 15);

  const win = multiplierWindow();
  const scrollable = multiplierRowCount > 3;
  multiplierMaxScroll = scrollable ? Math.max(0, (multiplierRowCount-3)*48) : 0;
  if (multiplierScrollY > multiplierMaxScroll) multiplierScrollY = multiplierMaxScroll;
  if (multiplierScrollY < 0) multiplierScrollY = 0;

  // Nur wenn wirklich scrollbar (>3 Reihen) wird geclippt und verschoben.
  // Bei 3 Reihen (Normalfall) direkt zeichnen - kein clip() pro Frame (Firefox-Performance).
  const off = scrollable ? multiplierScrollY : 0;
  if (scrollable) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(bankLeft, win.top, bankRight-bankLeft, win.height);
    ctx.clip();
  }

  for (const btn of multiplierButtons) {                  // Z.1118
    const drawY = btn.y - off;
    if (scrollable && (drawY + btn.height/2 < win.top - 4 || drawY - btn.height/2 > win.top + win.height + 4)) continue;
    const isActive = (btn.value === currentMultiplier && currentMultiplier !== 1);
    ctx.strokeStyle = isActive ? '#FFD700' : '#666666';
    ctx.lineWidth = 2;
    rr(btn.x, drawY - btn.height/2, btn.width, btn.height, 4); ctx.stroke();
    ctx.font = 'bold ' + fs(20) + 'px Arial'; ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(btn.label, btn.x + btn.width/2, drawY + 6);
  }
  if (scrollable) ctx.restore();

  // Scroll-Indikator (dezent), nur wenn scrollbar
  if (scrollable && multiplierMaxScroll > 0) {
    const trackX = bankRight - 10;
    const ratio = multiplierScrollY / multiplierMaxScroll;
    const thumbH = win.height * (win.height / (win.height + multiplierMaxScroll));
    const thumbY = win.top + ratio * (win.height - thumbH);
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    rr(trackX, win.top, 4, win.height, 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,215,0,0.55)';
    rr(trackX, thumbY, 4, thumbH, 2); ctx.fill();
  }
}

// Geometrie des sichtbaren Multiplikator-Fensters (immer 3 Reihen hoch).
function multiplierWindow() {
  const topY = bankTop + 25;
  const top = topY - 44/2 - 6;          // knapp oberhalb der ersten Reihe
  const height = 3*48 + 20;             // Platz fuer 3 Reihen (mit etwas Puffer)
  return { top, height };
}

// Gemeinsame Geometrie der Collection Area - von Zeichnen UND Klick-Erkennung genutzt,
// damit beide nie auseinanderlaufen. 8 Kugeln pro Reihe; 3 Reihen normal, 5 erweitert.
function collectionGeom() {
  const slotLeft = 30, slotTop = 180, slotRight = W - 30;
  const ballsPerRow = 8;
  const maxRows = expandedLayout ? 5 : 3;
  const rowH = 60;
  const slotBottom = slotTop + 50 + (maxRows-1)*rowH + 40;
  const firstX = slotLeft + 60;
  // Schritt dynamisch aus der Kastenbreite, damit 8 Kugeln sicher hineinpassen.
  const usable = (slotRight - 30) - firstX;
  const stepX = usable / (ballsPerRow - 1);
  return { slotLeft, slotTop, slotRight, slotBottom, ballsPerRow, maxRows, rowH, firstX, stepX };
}

function drawCollectionSlot() {                           // Z.1141
  const G = collectionGeom();
  ctx.fillStyle = '#1a1a2e';
  rr(G.slotLeft, G.slotTop, G.slotRight-G.slotLeft, G.slotBottom-G.slotTop, 12); ctx.fill();
  ctx.strokeStyle = '#0f3460'; ctx.lineWidth = 3;
  rr(G.slotLeft, G.slotTop, G.slotRight-G.slotLeft, G.slotBottom-G.slotTop, 12); ctx.stroke();

  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + fs(24) + 'px Arial'; ctx.fillStyle = '#FFD700';
  ctx.fillText('Collected:', G.slotLeft + 15, G.slotTop - 8);
  ctx.textAlign = 'center';

  // Ebenen-Zuordnung NACH WERT: gleiche Zahlen stehen immer auf derselben Ebene,
  // damit man sofort sieht, welche Kugeln zusammengehoeren (und wo eine falsche sitzt).
  // 1 Wert  -> Mitte
  // 2 Werte -> oben / unten
  // 3+      -> oben / Mitte / unten (alle weiteren Werte auf die untere Ebene)
  const ebeneVonWert = new Map();
  for (const it of collectedNumbers) {
    const key = String(it.value);
    if (!ebeneVonWert.has(key)) ebeneVonWert.set(key, ebeneVonWert.size);
  }
  const anzahlWerte = ebeneVonWert.size;

  let xOffset = G.firstX, row = 0;
  for (let index = 0; index < collectedNumbers.length; index++) {
    if (row >= G.maxRows) break;
    if (index > 0 && index % G.ballsPerRow === 0) {
      row++; xOffset = G.firstX;
      if (row >= G.maxRows) break;
    }
    const item = collectedNumbers[index];
    const yOffset = G.slotTop + 50 + row*G.rowH;
    const g = ctx.createRadialGradient(xOffset, yOffset, 0, xOffset, yOffset, 24);
    g.addColorStop(0,'#4CAF50'); g.addColorStop(1,'#388E3C');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(xOffset, yOffset, 27, 0, Math.PI*2); ctx.fill();

    // Ebene dieses Werts bestimmen (max. 3 Ebenen, alles darueber landet unten).
    const ebene = Math.min(ebeneVonWert.get(String(item.value)) || 0, 2);
    let textY = yOffset + 6;                       // Standard: Mitte (nur 1 Wert)
    if (anzahlWerte === 2) {
      textY = (ebene === 0) ? yOffset - 4 : yOffset + 18;      // oben / unten
    } else if (anzahlWerte >= 3) {
      textY = (ebene === 0) ? yOffset - 9                       // oben
            : (ebene === 1) ? yOffset + 6                       // Mitte
            : yOffset + 21;                                      // unten
    }

    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + fs(18) + 'px Arial'; ctx.textAlign = 'center';
    ctx.fillText(String(item.value), xOffset, textY);
    if (item.multiplier > 1) {                            // Z.1193
      // Multiplikator OBERHALB der Kugel - so ueberlappt er nicht mit den Nachbarn.
      ctx.font = 'bold ' + fs(15) + 'px Arial'; ctx.fillStyle = '#FFD700';
      ctx.fillText('\u00D7' + item.multiplier, xOffset, yOffset - 30);
    }
    xOffset += G.stepX;
  }
}

function fitFontForPool() {                               // Z.1208
  // Verfuegbare Breite richtet sich nach dem tatsaechlichen Kugelabstand.
  // Bei 2-Spalten-Layout (lange Zahlen) sind die Kugeln groesser -> mehr Platz.
  const r = (numberPool[0] && numberPool[0].radius) || 45;
  const buttonSpacing = r * 2.0;
  const MIN_FONT = fs(27);                 // wird nicht unterschritten
  let sharedFontSize = fs(36);
  for (const btn of numberPool) {
    const text = String(btn.value);
    ctx.font = 'bold ' + sharedFontSize + 'px Arial';
    while (ctx.measureText(text).width > buttonSpacing*0.95 && sharedFontSize > MIN_FONT) {
      sharedFontSize -= 2;
      ctx.font = 'bold ' + sharedFontSize + 'px Arial';
    }
  }
  return sharedFontSize;
}

function drawNumberPool() {                               // Z.1205
  const sharedFontSize = fitFontForPool();
  for (let i = 0; i < numberPool.length; i++) {
    const btn = numberPool[i];
    const g = ctx.createRadialGradient(btn.x, btn.y, 0, btn.x, btn.y, btn.radius);
    if (btn.clicked) { g.addColorStop(0,'#4CAF50'); g.addColorStop(1,'#388E3C'); }
    else { g.addColorStop(0,'#555555'); g.addColorStop(1,'#333333'); }
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(btn.x, btn.y, btn.radius, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = btn.clicked ? '#FFD700' : '#666666';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(btn.x, btn.y, btn.radius, 0, Math.PI*2); ctx.stroke();

    const text = String(btn.value);
    ctx.font = 'bold ' + sharedFontSize + 'px Arial';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    const textY = ctx.measureText(text).width > btn.radius*2   // Z.1249
      ? (i % 2 === 0 ? btn.y - 14 : btn.y + 34)
      : btn.y + 12;
    ctx.fillText(text, btn.x, textY);
  }
}

function drawSpeedSlider() {                              // Z.1259
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + fs(20) + 'px Arial'; ctx.fillStyle = '#fff';
  let totalSecs;
  if (gameState === S.CHARGING) {
    const elapsed = now() - chargingStartTime;
    const adj = Math.max(0, elapsed - 80);
    const mult = 1 + Math.pow(Math.min(1, Math.max(0, adj/2920)), 2)*4;
    totalSecs = Math.max(1, Math.floor(sliderValue/mult));
  } else if (gameState === S.FLYING) {
    if (proCountdownActive) {
      const ce = now() - proCountdownStartTime;
      const cr = Math.min(1, Math.max(0, ce/proCountdownDuration));
      totalSecs = Math.max(0, Math.floor(flightDuration*(1 - cr*cr)/1000));
    } else {
      const elapsed = now() - ballFlightStartTime;
      totalSecs = Math.floor(Math.max(0, flightDuration - elapsed)/1000);
    }
  } else if (gameState === S.ANIMATING || gameState === S.EVALUATING) totalSecs = 0;
  else totalSecs = Math.floor(sliderValue);

  const displayText = totalSecs < 60 ? totalSecs + 's'
    : Math.floor(totalSecs/60) + 'm' + (totalSecs%60) + 's';
  ctx.fillText('Speed: ' + displayText, sliderX + sliderWidth + 20, sliderY + 6);

  ctx.strokeStyle = '#444444'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(sliderX, sliderY); ctx.lineTo(sliderX+sliderWidth, sliderY); ctx.stroke();

  const thumbX = sliderX + ((sliderValue-1)/299)*sliderWidth;
  ctx.fillStyle = '#222222';
  ctx.beginPath(); ctx.arc(thumbX+2, sliderY+2, 18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(thumbX, sliderY, 18, 0, Math.PI*2); ctx.fill();
  ctx.textAlign = 'center';
}

function drawDifficultySlider() {                         // Z.1311

function drawResultMessage() {                            // Z.1344
  const success = wasSuccess;
  const cx = W/2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';

  if (!success) {                                         // Z.1350
    const buttonSpacing = numberPool.length > 1
      ? Math.abs(numberPool[1].x - numberPool[0].x)
      : 90;
    for (let i = 0; i < numberPool.length; i++) {
      const btn = numberPool[i];
      const isCorrect = (btn.value === failCorrectAnswer);
      const isWrong = failCollected.some(v => v === btn.value) && !isCorrect;
      const c1 = isCorrect ? '#4CAF50' : isWrong ? '#FF5252' : '#555555';
      const c2 = isCorrect ? '#388E3C' : isWrong ? '#C62828' : '#333333';
      const g = ctx.createRadialGradient(btn.x, btn.y, 0, btn.x, btn.y, btn.radius);
      g.addColorStop(0,c1); g.addColorStop(1,c2);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(btn.x, btn.y, btn.radius, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = isCorrect ? '#FFD700' : isWrong ? '#FF0000' : '#666666';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(btn.x, btn.y, btn.radius, 0, Math.PI*2); ctx.stroke();

      const text = String(btn.value);
      let fontSize = fs(36);
      ctx.font = 'bold ' + fontSize + 'px Arial';
      while (ctx.measureText(text).width > buttonSpacing*0.95 && fontSize > 10) {
        fontSize -= 2; ctx.font = 'bold ' + fontSize + 'px Arial';
      }
      ctx.fillStyle = '#fff';
      const textY = ctx.measureText(text).width > btn.radius*2
        ? (i % 2 === 0 ? btn.y - 14 : btn.y + 34) : btn.y + 12;
      ctx.fillText(text, btn.x, textY);
    }
  }

  ctx.font = 'bold ' + fs(70) + 'px Arial';                           // Z.1405
  ctx.fillStyle = success ? '#4CAF50' : '#FF5252';
  ctx.fillText(success ? 'SUCCESS!' : 'FAILED', cx, H/2 - 50);

  ctx.font = 'bold ' + fs(50) + 'px Arial'; ctx.fillStyle = '#FFD700';
  ctx.fillText('Score: ' + displayScore, cx, H/2 + 30);

  if (!success && failCorrectAnswer > 0n) {               // Z.1414
    const totalDivisor = prodB(dornDividers);
    ctx.font = 'bold ' + fs(28) + 'px Arial'; ctx.fillStyle = '#AAAAAA';
    ctx.fillText('Richtige L\u00F6sung:', cx, H/2 + 80);
    ctx.font = 'bold ' + fs(34) + 'px Arial'; ctx.fillStyle = '#4CAF50';
    ctx.fillText(totalDivisor + ' \u00D7 ' + failCorrectAnswer + ' = ' + failScoreBefore, cx, H/2 + 120);
  }

  ctx.font = 'bold ' + fs(32) + 'px Arial'; ctx.fillStyle = '#fff';
  ctx.fillText('Tap to continue', cx, H - 60);
}

function drawHighscoreOverlay() {                         // Z.1492
  ctx.fillStyle = 'rgba(0,0,30,0.863)';
  ctx.fillRect(0,0,W,H);
  const cx = W/2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + fs(42) + 'px Arial'; ctx.fillStyle = '#FFD700';
  ctx.fillText('Bestenliste', cx, 80);

  const sorted = highscores.slice().sort((a,b) => {       // Z.1502
    if (highscoreSort === 0) return (b.score > a.score) ? 1 : (b.score < a.score) ? -1 : 0;
    if (highscoreSort === 1) return b.round - a.round;
    if (b.difficulty !== a.difficulty) return b.difficulty - a.difficulty;
    if (b.score !== a.score) return (b.score > a.score) ? 1 : -1;
    return b.round - a.round;
  });

  const btnW = 130;
  const bx = [cx-200, cx-65, cx+70];
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = (highscoreSort === i) ? '#FFD700' : '#333355';
    rr(bx[i], 100, btnW, 45, 10); ctx.fill();
  }
  ctx.font = 'bold ' + fs(24) + 'px Arial';
  const labels = ['\u2193 Score','\u2193 Level','\u2193 Diff'];
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = (highscoreSort === i) ? '#000' : '#fff';
    ctx.fillText(labels[i], bx[i] + btnW/2, 132);
  }

  const rowHeight = 70, startY = 175;
  // Sichtbarer Listenbereich (zwischen Sortier-Knoepfen und Schliessen-Knopf)
  const listTop = startY - 40, listBottom = H - 120;
  const listH = listBottom - listTop;
  const contentH = sorted.length * rowHeight;
  const maxScroll = Math.max(0, contentH - listH);

// Belohnungs-Animation beim Freischalten neuer Reihen.
// Zeit-Phasen (leicht anpassbar): einblenden -> halten -> ausblenden.
function drawUnlockAnim() {
  const tNow = now();
  if (tNow >= unlockAnimUntil) return;

  const FADE_IN = 550;    // Einblenden (ms) - dein Bereich 400-700
  const HOLD    = 900;    // sichtbar bleiben (ms)
  const FADE_OUT = 750;   // Ausblenden (ms) - deine Dreiviertelsekunde
  const total = FADE_IN + HOLD + FADE_OUT;

  // Wie weit ist die Animation? (0 = Start, total = Ende)
  const elapsed = total - (unlockAnimUntil - tNow);

  let alpha;
  if (elapsed < FADE_IN) alpha = elapsed / FADE_IN;                 // einblenden
  else if (elapsed < FADE_IN + HOLD) alpha = 1;                     // halten
  else alpha = 1 - (elapsed - FADE_IN - HOLD) / FADE_OUT;           // ausblenden
  alpha = Math.max(0, Math.min(1, alpha));

  const cx = W/2, cy = H*0.30;
  ctx.save();
  ctx.globalAlpha = alpha * 0.9;
  // sanfter Hintergrund-Streifen
  ctx.fillStyle = 'rgba(20,20,40,0.85)';
  const bw = 520, bh = 90;
  rr(cx - bw/2, cy - bh/2, bw, bh, 16); ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.6)'; ctx.lineWidth = 2;
  rr(cx - bw/2, cy - bh/2, bw, bh, 16); ctx.stroke();
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold ' + fs(34) + 'px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(unlockAnimText, cx, cy);
  ctx.restore();
}

// Rotes Aufflammen beim Entfernen (einmaliger Puls, verblasst sanft, kein Blinken).
function drawRemoveFlashes() {
  if (!removeFlashes.length) return;
  const tNow = now();
  for (let i = removeFlashes.length - 1; i >= 0; i--) {
    const f = removeFlashes[i];
    const left = f.until - tNow;
    if (left <= 0) { removeFlashes.splice(i,1); continue; }
    const alpha = Math.max(0, Math.min(1, left / 700));   // 1 -> 0 (verblassen)
    ctx.save();
    ctx.globalAlpha = alpha;
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
    g.addColorStop(0, '#ff5252'); g.addColorStop(1, '#c62828');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

//  ZAHLENPOOL  (Z. 1626)
// ===============================================================

function generateNumberPool() {
  numberPool = [];
  const totalDivisor = prodB(dornDividers);
  if (score % totalDivisor !== 0n) return;                // Z.1632

  const correctValue = score / totalDivisor;
  const allValues = [correctValue];
  const addVal = v => { if (!allValues.some(x => x === v)) allValues.push(v); };

  if (difficulty === 1) {                                 // Z.1643
    for (const div of findCleanDivisors(score, 9).slice(0,3)) addVal(score / B(div));
  } else if (difficulty === 2 || difficulty === 3 || difficulty === 4) {   // Z.1649
    for (const div of findCleanDivisors(score, 9)) addVal(score / B(div));
    if (correctValue > 15n) {
      const offsets = shuffle([3,5,7,11,13,17,19,23]);
      const signs = shuffle([1n,1n,-1n,-1n,1n,-1n]);
      for (let i = 0; i <= 1; i++) {
        const pct = B(offsets[i]);
        let delta = (correctValue * pct) / 100n;
        if (delta < 1n) delta = 1n;
        const cand = correctValue + signs[i]*delta;
        if (cand > 0n && cand !== correctValue) addVal(cand);
      }
    }
  }

  const distractors = shuffle(allValues.filter(v => v > 0n && v !== correctValue)).slice(0,5);
  const values = shuffle([correctValue].concat(distractors));

  // Laengste Zahl bestimmen -> entscheidet, ob 3 oder 2 Kugeln pro Reihe.
  // Ziel: die Mindest-Schrift (POOL_MIN_FONT) soll nicht unterschritten werden muessen.
  const POOL_MIN_FONT = fs(20);
  let longest = 0;
  ctx.font = 'bold ' + POOL_MIN_FONT + 'px Arial';
  for (const v of values) longest = Math.max(longest, ctx.measureText(String(v)).width);

  // Verfuegbare Breite pro Kugel bei 3 Spalten:
  const width3 = (bankRight - bankLeft) * 0.28 * 0.95;
  // Passt die laengste Zahl bei Mindestschrift NICHT in 3 Spalten -> auf 2 Spalten wechseln.
  const cols = (longest > width3) ? 2 : 3;

  const rows = Math.ceil(6 / cols);        // 3 Spalten -> 2 Reihen; 2 Spalten -> 3 Reihen
  const centerX = (bankLeft + bankRight)/2;
  const centerY = bankTop + (cols === 2 ? 300 : 320);
  const spacingX = (bankRight - bankLeft) * (cols === 2 ? 0.34 : 0.28);
  const spacingY = (cols === 2) ? 95 : 110;
  const radius = (cols === 2) ? 52 : 45;

  let index = 0;
  for (let row = 0; row < rows; row++)
    for (let col = 0; col < cols; col++)
      if (index < values.length) {
        const cx = centerX + (col - (cols-1)/2)*spacingX;
        const cy = centerY + (row - (rows-1)/2)*spacingY;
        numberPool.push({ value: values[index], x: cx, y: cy, radius, clicked: false });
        index++;
      }
}

function updateBallPosition(progress) {                   // Z.2136
  const seg1 = 0.35, seg2 = 0.35;
  const endY = bowlY - 70, startY = getBallOnSpringY();
  if (progress < seg1) {
    const p = progress/seg1;
    ballX = springX; ballY = startY - (startY - segment1EndY)*p;
  } else if (progress < seg1 + seg2) {
    const p = (progress - seg1)/seg2;
    ballX = springX + (segment2EndX - springX)*p; ballY = segment1EndY;
  } else {
    const p = (progress - seg1 - seg2)/(1 - seg1 - seg2);
    ballX = segment2EndX; ballY = segment1EndY + (endY - segment1EndY)*p;
  }
}

function collectNumber(btn) {                             // Z.2163

    btn.clicked = true;
    collectedNumbers.push({ value: btn.value, multiplier: currentMultiplier });
